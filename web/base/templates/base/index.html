<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        tactical: ['Rajdhani', 'sans-serif'],
                    },
                    colors: {
                        tactical: {
                            900: '#0b0f16', // Deep off-black/slate
                            800: '#131a26', // Lighter slate for cards
                            border: '#1f2937'
                        },
                        strike: {
                            500: '#e11d48', // Aggressive red to match logo
                            600: '#be123c'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Tactical Grid Background */
        body {
            background-color: #0b0f16;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: center center;
        }

        /* Subtle scanline overlay */
        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* Angular clip-path for button to give it an esport edge */
        .esport-btn {
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
    </style>
</head>
<body class="font-tactical text-gray-100 min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="scanlines absolute inset-0 z-0"></div>

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-strike-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <main class="relative z-10 w-full max-w-md px-6 flex flex-col items-center gap-8">

        <div class="w-64 sm:w-80 filter drop-shadow-[0_0_15px_rgba(225,29,72,0.3)]">
            <img src="/static/logo.png" alt="Logo" class="w-full h-auto object-contain" />
        </div>

        <div class="w-full bg-tactical-800/90 backdrop-blur-sm border border-tactical-border shadow-2xl relative">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-strike-500 to-transparent"></div>

            <form class="p-8 flex flex-col gap-5">

                <div class="flex flex-col gap-1">
                    <label for="username" class="text-xs font-semibold tracking-widest text-gray-400 uppercase">Username</label>
                    <input
                        type="text"
                        id="username"
                        class="w-full bg-tactical-900 border border-tactical-border text-white px-4 py-3 focus:outline-none focus:border-strike-500 focus:ring-1 focus:ring-strike-500 transition-colors tracking-wide placeholder-gray-600"
                        placeholder="ENTER USERNAME"
                        required
                    >
                </div>

                <div class="flex flex-col gap-1">
                    <label for="password" class="text-xs font-semibold tracking-widest text-gray-400 uppercase">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="w-full bg-tactical-900 border border-tactical-border text-white px-4 py-3 focus:outline-none focus:border-strike-500 focus:ring-1 focus:ring-strike-500 transition-colors tracking-wide placeholder-gray-600"
                        placeholder="ENTER PASSWORD"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="esport-btn mt-4 w-full bg-strike-600 hover:bg-strike-500 text-white font-bold text-lg py-3 uppercase tracking-widest transition-all duration-300 hover:shadow-[0_0_20px_rgba(225,29,72,0.4)]">
                    Login
                </button>

            </form>

            <div class="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-gray-500"></div>
            <div class="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-gray-500"></div>
        </div>
    </main>

</body>
</html>
